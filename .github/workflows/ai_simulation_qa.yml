name: AI Simulation & Audit Engine QA

on:
  workflow_dispatch:

jobs:
  run-simulation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Set up Firebase Credentials
        run: |
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_DOLARIZE_APP }}' > firebase.json
        # Ensuring we mask the output or we don't output the content at all!

      - name: Run AI Simulation
        env:
          GOOGLE_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/firebase.json
        run: |
          cd backend
          python -m scripts.run_simulation

      - name: Output Report to Job Summary
        run: |
          if [ -f "backend/simulation_report.md" ]; then
            cat backend/simulation_report.md >> $GITHUB_STEP_SUMMARY
          else
            echo "No simulation report generated." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Clean up Firebase Credentials
        if: always()
        run: rm -f firebase.json
